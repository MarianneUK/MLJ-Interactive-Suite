<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport"
          content="width=device-width, initial-scale=1.0">

    <title>MLJ Interactive Learning Suite</title>

    <link rel="stylesheet"
          href="css/style.css">

</head>

<body>

    <div class="container">
    <section class="hero">

    <h1>MLJ Interactive Learning Suite</h1>

    <h2>Word of the Moment</h2>

    <div class="card">

    <h3 id="word">Generous</h3>

    <p id="pronunciation">/ˈdʒenərəs/</p>

    <p id="wordMeta">
        adjective · B1 · values
    </p>

    <p id="definition">
        Kind and willing to give or share.
    </p>

    <div class="example-box">
        <h4>Example</h4>
        <p id="example">She was very generous with her time.</p>
    </div>

    <div class="word-lists">
        <p><strong>Synonyms:</strong> <span id="synonyms">kind, giving</span></p>
        <p><strong>Antonyms:</strong> <span id="antonyms">selfish, mean</span></p>
    </div>

    <button id="nextWord">
        Next Word
    </button>

    </div>

    </section>
    </div>

    <script src="js/vocabulary.js"></script>

</body>

</html>
